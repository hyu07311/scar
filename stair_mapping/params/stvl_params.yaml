costmap:
  ros__parameters:
    use_sim_time: false
    global_frame: map          # odom → map 으로 수정
    robot_base_frame: base_link  # camera_link → base_link 로 수정
    rolling_window: true
    width: 4
    height: 4
    resolution: 0.05
    plugins: ["obstacle_layer", "inflation_layer"]
    
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: true
      observation_sources: scan
      scan:
        topic: /scan
        max_obstacle_height: !!float 2.0
        clearing: true
        marking: true
        data_type: "LaserScan"

    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: !!float 0.3
      cost_scaling_factor: !!float 10.0
